<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jankless Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #08080f;
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      overflow-y: auto;       /* allow scroll if stage is taller than viewport */
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s;
    }
    body::-webkit-scrollbar { width: 6px; }
    body::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.25); border-radius: 3px; }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      transition: background-image 0.2s;
    }

    /* ─── Light mode ──────────────────────────────── */

    body[data-theme="light"] {
      background: #f0f4f8;
    }

    body[data-theme="light"]::before {
      background-image:
        linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
    }

    body[data-theme="light"] #heading {
      color: #1a202c;
    }

    body[data-theme="light"] #subtext {
      color: #64748b;
    }

    body[data-theme="light"] #card {
      background: #ffffff;
      border-color: #dde3ec;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    body[data-theme="light"] .card-label { color: #94a3b8; }
    body[data-theme="light"] .card-metric { color: #1a202c; }
    body[data-theme="light"] .card-sub { color: #94a3b8; }
    body[data-theme="light"] .card-bar { background: rgba(99,102,241,0.15); }
    body[data-theme="light"] .card-bar.active { background: #6366f1; }

    #stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 28px 32px;
      width: 100%;
      min-height: 100vh;
      position: relative;
    }

    #heading {
      font-size: 34px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.8px;
      text-align: center;
    }

    #subtext {
      font-size: 13px;
      color: #4a5568;
      text-align: center;
      max-width: 280px;
    }

    #card {
      width: 240px;
      background: #111120;
      border: 1px solid #1e1e32;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.4);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #64748b;
    }

    .card-badge {
      background: rgba(0,230,122,0.12);
      color: #00e67a;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 0.02em;
    }

    .card-metric {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: 11px;
      color: #4a5568;
      margin-bottom: 16px;
    }

    .card-bars {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      height: 36px;
    }

    .card-bar {
      flex: 1;
      background: rgba(99,102,241,0.2);
      border-radius: 3px 3px 0 0;
      min-height: 4px;
    }

    .card-bar.active {
      background: #6366f1;
    }

    #boxes {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .box {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      flex-shrink: 0;
    }

    #box1 { background: #6366f1; }
    #box2 { background: #8b5cf6; }
    #box3 { background: #a78bfa; }

    #circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ec4899 0%, #f97316 100%);
      flex-shrink: 0;
    }

    /* Target 7 — Underline (for DrawSVG demos) */
    #underline-svg {
      display: block;
      margin-top: -10px;
      overflow: visible;
    }
    #underline {
      stroke: #6366f1;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
    }
    body[data-theme="light"] #underline { stroke: #6366f1; }

    /* Targets 8 + 9 — Morph Shapes, sit on either side of the Hero Circle */
    #symbol-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }
    #morph-svg, #morph-svg-2 {
      display: block;
      overflow: visible;
      flex-shrink: 0;
    }
    #morph-shape   { fill: url(#morph-grad); }
    #morph-shape-2 { fill: url(#morph-grad-2); }

    /* Compact layout when the canvas iframe gets narrow.
       NOTE: only collapse padding/gap — keep all elements visible
       so they stay valid animation targets. */
    @media (max-width: 520px) {
      #stage { gap: 14px; padding: 20px 16px; }
      #heading { font-size: 26px; }
      #subtext { font-size: 12px; }
    }

    /* ─── Target highlight overlay ────────────────────────────────── */
    #jl-highlight-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }
    .jl-highlight {
      position: absolute;
      border: 2px dashed #6366f1;
      border-radius: 6px;
      background: rgba(99,102,241,0.07);
      box-shadow:
        0 0 0 1px rgba(99,102,241,0.25),
        0 0 20px rgba(99,102,241,0.45);
      animation: jl-pulse 1.4s ease-in-out infinite;
    }
    @keyframes jl-pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }
    body[data-theme="light"] .jl-highlight {
      background: rgba(99,102,241,0.1);
      box-shadow:
        0 0 0 1px rgba(99,102,241,0.35),
        0 0 16px rgba(99,102,241,0.35);
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="heading">Jankless</div>
    <!-- Target 7 — Underline path (DrawSVG demos) -->
    <svg id="underline-svg" width="220" height="14" viewBox="0 0 220 14" xmlns="http://www.w3.org/2000/svg">
      <path id="underline" d="M5 8 Q 55 0, 110 7 T 215 6"/>
    </svg>
    <div id="subtext">Beautiful GSAP animations, zero jank.</div>
    <div id="card">
      <div class="card-header">
        <span class="card-label">Monthly Revenue</span>
        <span class="card-badge">↑ 12.4%</span>
      </div>
      <div class="card-metric">$24,391</div>
      <div class="card-sub">vs $21,680 last month</div>
      <div class="card-bars">
        <div class="card-bar" style="height:38%"></div>
        <div class="card-bar" style="height:52%"></div>
        <div class="card-bar" style="height:44%"></div>
        <div class="card-bar" style="height:68%"></div>
        <div class="card-bar" style="height:57%"></div>
        <div class="card-bar" style="height:82%"></div>
        <div class="card-bar active" style="height:100%"></div>
      </div>
    </div>
    <div id="boxes">
      <div class="box" id="box1"></div>
      <div class="box" id="box2"></div>
      <div class="box" id="box3"></div>
    </div>
    <!-- Bottom row: Morph Heart (Target 8) — Hero Circle (Target 6) — Morph Clover (Target 9) -->
    <div id="symbol-row">
      <!-- Target 8 — Morph Heart -->
      <svg id="morph-svg" width="56" height="56" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="morph-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ec4899"/>
            <stop offset="100%" stop-color="#f97316"/>
          </linearGradient>
        </defs>
        <path id="morph-shape" d="M32 56 C 8 36, 4 16, 20 12 C 28 10, 32 18, 32 22 C 32 18, 36 10, 44 12 C 60 16, 56 36, 32 56 Z"/>
      </svg>

      <div id="circle"></div>

      <!-- Target 9 — Morph Clover -->
      <svg id="morph-svg-2" width="56" height="56" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="morph-grad-2" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#22c55e"/>
            <stop offset="100%" stop-color="#10b981"/>
          </linearGradient>
        </defs>
        <path id="morph-shape-2" d="M32 8 C32 14 38 18 44 16 C48 22 46 30 40 32 C46 34 48 42 44 48 C38 46 32 50 32 56 C32 50 26 46 20 48 C16 42 18 34 24 32 C18 30 16 22 20 16 C26 18 32 14 32 8 Z"/>
      </svg>
    </div>
  </div>

  <!-- GSAP core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <!-- Bonus + free plugins (self-hosted, see /vendor/) -->
  <script src="vendor/EasePack.min.js"></script>
  <script src="vendor/CustomEase.min.js"></script>
  <script src="vendor/CustomBounce.min.js"></script>
  <script src="vendor/CustomWiggle.min.js"></script>
  <script src="vendor/SplitText.min.js"></script>
  <script src="vendor/Flip.min.js"></script>
  <script src="vendor/MotionPathPlugin.min.js"></script>
  <script src="vendor/DrawSVGPlugin.min.js"></script>
  <script src="vendor/MorphSVGPlugin.min.js"></script>
  <script src="vendor/Physics2DPlugin.min.js"></script>
  <script src="vendor/ScrambleTextPlugin.min.js"></script>
  <script src="vendor/TextPlugin.min.js"></script>
  <script>
    // Register every plugin we expect to use. Wrapped in try so a missing
    // file (e.g. user hasn't dropped one in /vendor/) only logs and keeps
    // the rest working.
    function safeReg(name, obj) {
      if (typeof obj !== 'undefined') {
        try { gsap.registerPlugin(obj); }
        catch (e) { console.warn('[Jankless] failed to register', name, e); }
      } else {
        console.info('[Jankless] plugin not loaded:', name);
      }
    }
    safeReg('CustomEase',         window.CustomEase);
    safeReg('CustomBounce',       window.CustomBounce);
    safeReg('CustomWiggle',       window.CustomWiggle);
    safeReg('SplitText',          window.SplitText);
    safeReg('Flip',               window.Flip);
    safeReg('MotionPathPlugin',   window.MotionPathPlugin);
    safeReg('DrawSVGPlugin',      window.DrawSVGPlugin);
    safeReg('MorphSVGPlugin',     window.MorphSVGPlugin);
    safeReg('Physics2DPlugin',    window.Physics2DPlugin);
    safeReg('ScrambleTextPlugin', window.ScrambleTextPlugin);
    safeReg('TextPlugin',         window.TextPlugin);

    const TARGETS = ['#heading', '#subtext', '#card', '.card-header', '.card-label', '.card-badge', '.card-metric', '.card-sub', '.card-bars', '.card-bar', '#box1', '#box2', '#box3', '#circle', '#boxes', '#stage', '#underline', '#underline-svg', '#morph-shape', '#morph-svg', '#morph-shape-2', '#morph-svg-2', '#symbol-row'];

    // Capture the original SVG path data so we can revert across runs
    const _capturePath = id => {
      const el = document.getElementById(id);
      return el ? el.getAttribute('d') : null;
    };
    const _morphOriginal     = _capturePath('morph-shape');
    const _morph2Original    = _capturePath('morph-shape-2');
    const _underlineOriginal = _capturePath('underline');

    let _timeScale = 1;
    let _master    = null;       // master timeline that wraps user code
    let _loop      = false;
    let _yoyo      = false;
    let _lastCode  = '';
    let _scrubbing = false;       // user is dragging the scrubber

    function resetAll() {
      if (_master) {
        _master.kill();
        _master = null;
      }
      gsap.killTweensOf('*');
      TARGETS.forEach(sel => {
        const el = document.querySelector(sel);
        if (el) gsap.set(el, { clearProps: 'all' });
      });
      // Restore SVG path data so morph/draw demos can re-run cleanly
      const morph = document.getElementById('morph-shape');
      if (morph && _morphOriginal) morph.setAttribute('d', _morphOriginal);
      const morph2 = document.getElementById('morph-shape-2');
      if (morph2 && _morph2Original) morph2.setAttribute('d', _morph2Original);
      const underline = document.getElementById('underline');
      if (underline && _underlineOriginal) underline.setAttribute('d', _underlineOriginal);
      // Revert SplitText if it injected wrappers
      try {
        document.querySelectorAll('.split-revert-marker').forEach(s => s.remove?.());
      } catch (_) {}
    }

    function postProgress() {
      if (!_master) return;
      const dur = _master.duration() || 0;
      const t   = _master.time();
      const p   = dur > 0 ? Math.min(t / dur, 1) : 0;
      window.parent.postMessage({
        type: 'PROGRESS',
        progress: p,
        time: t,
        duration: dur,
      }, '*');
    }

    /**
     * Run user code inside a master timeline.
     *
     * We monkey-patch gsap.to/from/fromTo/set/timeline so any tween the
     * user creates is added to our master timeline instead of going
     * straight to the global one. This gives us a single handle to
     * scrub, loop, and yoyo over the whole animation.
     */
    function runUserCode(code) {
      resetAll();

      _master = gsap.timeline({
        repeat: _loop ? -1 : 0,
        yoyo:   _yoyo,
        onUpdate: postProgress,
        onRepeat: postProgress,
        onComplete: postProgress,
      });
      _master.timeScale(_timeScale);

      // Save originals
      const _to       = gsap.to;
      const _from     = gsap.from;
      const _fromTo   = gsap.fromTo;
      const _set      = gsap.set;
      const _timeline = gsap.timeline;

      // Patch — route everything through the master timeline
      gsap.to     = function (target, vars)            { return _master.to(target, vars); };
      gsap.from   = function (target, vars)            { return _master.from(target, vars); };
      gsap.fromTo = function (target, fromVars, toVars){ return _master.fromTo(target, fromVars, toVars); };
      gsap.set    = function (target, vars)            { return _master.set(target, vars); };
      gsap.timeline = function (vars) {
        const child = _timeline.call(gsap, vars);
        _master.add(child);
        return child;
      };

      try {
        // eslint-disable-next-line no-new-func
        const fn = new Function('gsap', code);
        fn(gsap);
        window.parent.postMessage({
          type: 'ANIMATION_OK',
          duration: _master.duration(),
        }, '*');
      } catch (err) {
        window.parent.postMessage({ type: 'ANIMATION_ERROR', error: err.message }, '*');
      } finally {
        // Restore originals
        gsap.to       = _to;
        gsap.from     = _from;
        gsap.fromTo   = _fromTo;
        gsap.set      = _set;
        gsap.timeline = _timeline;
      }

      postProgress();
    }

    window.addEventListener('message', function(e) {
      if (!e.data || !e.data.type) return;

      switch (e.data.type) {

        case 'RUN_ANIMATION':
          _lastCode = e.data.code;
          runUserCode(e.data.code);
          break;

        case 'RESET':
          resetAll();
          window.parent.postMessage({ type: 'RESET_OK' }, '*');
          window.parent.postMessage({ type: 'PROGRESS', progress: 0, time: 0, duration: 0 }, '*');
          break;

        case 'PAUSE':
          if (_master) _master.pause();
          break;

        case 'PLAY':
          if (_master) _master.play();
          break;

        case 'SET_TIMESCALE':
          _timeScale = e.data.value;
          if (_master) _master.timeScale(_timeScale);
          break;

        case 'SET_PROGRESS':
          if (_master) {
            _scrubbing = !!e.data.scrubbing;
            if (_scrubbing) _master.pause();
            _master.progress(Math.max(0, Math.min(1, e.data.value)));
          }
          break;

        case 'SCRUB_END':
          _scrubbing = false;
          if (_master && e.data.resume) _master.play();
          break;

        case 'SET_LOOP':
          _loop = !!e.data.value;
          // Re-run so the new repeat setting takes effect
          if (_lastCode) runUserCode(_lastCode);
          break;

        case 'SET_YOYO':
          _yoyo = !!e.data.value;
          if (_lastCode) runUserCode(_lastCode);
          break;

        case 'SET_THEME':
          document.body.setAttribute('data-theme', e.data.theme);
          break;

        case 'HIGHLIGHT_TARGET':
          highlightTargets(e.data.selector);
          break;

        case 'UNHIGHLIGHT_TARGET':
          clearHighlights();
          break;
      }
    });

    // ─── Hover highlight overlay ──────────────────────────────────────────
    let _hlLayer = null;
    function ensureHlLayer() {
      if (_hlLayer && document.body.contains(_hlLayer)) return _hlLayer;
      _hlLayer = document.createElement('div');
      _hlLayer.id = 'jl-highlight-layer';
      document.body.appendChild(_hlLayer);
      return _hlLayer;
    }
    function clearHighlights() {
      if (_hlLayer) _hlLayer.innerHTML = '';
    }
    function drawRectsForSelector(selector) {
      clearHighlights();
      if (!selector) return;
      let els;
      try { els = document.querySelectorAll(selector); }
      catch (_) { return; }
      const layer = ensureHlLayer();
      els.forEach(el => {
        const r = el.getBoundingClientRect();
        if (r.width === 0 && r.height === 0) return;
        const hl = document.createElement('div');
        hl.className = 'jl-highlight';
        const pad = 4;
        hl.style.left   = (r.left   - pad) + 'px';
        hl.style.top    = (r.top    - pad) + 'px';
        hl.style.width  = (r.width  + pad * 2) + 'px';
        hl.style.height = (r.height + pad * 2) + 'px';
        layer.appendChild(hl);
      });
    }

    function highlightTargets(selector) {
      if (!selector) { clearHighlights(); return; }
      let els;
      try { els = document.querySelectorAll(selector); }
      catch (_) { return; }

      // If the first match is off-screen, scroll it into view first,
      // then draw the highlights at their post-scroll positions.
      const first = els[0];
      if (first) {
        const r = first.getBoundingClientRect();
        const offTop    = r.top < 0;
        const offBottom = r.bottom > window.innerHeight;
        if (offTop || offBottom) {
          first.scrollIntoView({ behavior: 'smooth', block: 'center' });
          // Wait a moment for the smooth scroll to land before drawing
          setTimeout(() => drawRectsForSelector(selector), 320);
          return;
        }
      }
      drawRectsForSelector(selector);
    }
    // Recompute on resize so highlights track layout changes
    window.addEventListener('resize', () => {
      // No stored selector — parent re-sends on hover. Just clear stale rects.
      clearHighlights();
    });

    // Tell the parent we're ready
    window.parent.postMessage({ type: 'SANDBOX_READY' }, '*');
  </script>
</body>
</html>
