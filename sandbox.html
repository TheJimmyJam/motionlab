<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jankless Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #08080f;
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      transition: background-image 0.2s;
    }

    /* ─── Light mode ──────────────────────────────── */

    body[data-theme="light"] {
      background: #f0f4f8;
    }

    body[data-theme="light"]::before {
      background-image:
        linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
    }

    body[data-theme="light"] #heading {
      color: #1a202c;
    }

    body[data-theme="light"] #subtext {
      color: #64748b;
    }

    body[data-theme="light"] #card {
      background: #ffffff;
      border-color: #dde3ec;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    body[data-theme="light"] .card-label { color: #94a3b8; }
    body[data-theme="light"] .card-metric { color: #1a202c; }
    body[data-theme="light"] .card-sub { color: #94a3b8; }
    body[data-theme="light"] .card-bar { background: rgba(99,102,241,0.15); }
    body[data-theme="light"] .card-bar.active { background: #6366f1; }

    #stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 48px 40px;
      width: 100%;
      min-height: 100vh;
      position: relative;
    }

    #heading {
      font-size: 34px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.8px;
      text-align: center;
    }

    #subtext {
      font-size: 13px;
      color: #4a5568;
      text-align: center;
      max-width: 280px;
    }

    #card {
      width: 240px;
      background: #111120;
      border: 1px solid #1e1e32;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.4);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #64748b;
    }

    .card-badge {
      background: rgba(0,230,122,0.12);
      color: #00e67a;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 0.02em;
    }

    .card-metric {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: 11px;
      color: #4a5568;
      margin-bottom: 16px;
    }

    .card-bars {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      height: 36px;
    }

    .card-bar {
      flex: 1;
      background: rgba(99,102,241,0.2);
      border-radius: 3px 3px 0 0;
      min-height: 4px;
    }

    .card-bar.active {
      background: #6366f1;
    }

    #boxes {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .box {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      flex-shrink: 0;
    }

    #box1 { background: #6366f1; }
    #box2 { background: #8b5cf6; }
    #box3 { background: #a78bfa; }

    #circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ec4899 0%, #f97316 100%);
      flex-shrink: 0;
    }

    @media (max-width: 768px) {
      #heading, #subtext { display: none; }
      #stage { gap: 16px; padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="heading">Jankless</div>
    <div id="subtext">Beautiful GSAP animations, zero jank.</div>
    <div id="card">
      <div class="card-header">
        <span class="card-label">Monthly Revenue</span>
        <span class="card-badge">↑ 12.4%</span>
      </div>
      <div class="card-metric">$24,391</div>
      <div class="card-sub">vs $21,680 last month</div>
      <div class="card-bars">
        <div class="card-bar" style="height:38%"></div>
        <div class="card-bar" style="height:52%"></div>
        <div class="card-bar" style="height:44%"></div>
        <div class="card-bar" style="height:68%"></div>
        <div class="card-bar" style="height:57%"></div>
        <div class="card-bar" style="height:82%"></div>
        <div class="card-bar active" style="height:100%"></div>
      </div>
    </div>
    <div id="boxes">
      <div class="box" id="box1"></div>
      <div class="box" id="box2"></div>
      <div class="box" id="box3"></div>
    </div>
    <div id="circle"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    const TARGETS = ['#heading', '#subtext', '#card', '.card-header', '.card-label', '.card-badge', '.card-metric', '.card-sub', '.card-bars', '.card-bar', '#box1', '#box2', '#box3', '#circle', '#boxes', '#stage'];

    let _timeScale = 1;

    function resetAll() {
      gsap.killTweensOf('*');
      TARGETS.forEach(sel => {
        const el = document.querySelector(sel);
        if (el) gsap.set(el, { clearProps: 'all' });
      });
    }

    window.addEventListener('message', function(e) {
      if (!e.data || !e.data.type) return;

      if (e.data.type === 'RUN_ANIMATION') {
        resetAll();
        gsap.globalTimeline.play();
        gsap.globalTimeline.timeScale(_timeScale);
        try {
          // eslint-disable-next-line no-new-func
          const fn = new Function('gsap', e.data.code);
          fn(gsap);
          window.parent.postMessage({ type: 'ANIMATION_OK' }, '*');
        } catch (err) {
          window.parent.postMessage({ type: 'ANIMATION_ERROR', error: err.message }, '*');
        }
      }

      if (e.data.type === 'RESET') {
        resetAll();
        gsap.globalTimeline.play();
        gsap.globalTimeline.timeScale(_timeScale);
        window.parent.postMessage({ type: 'RESET_OK' }, '*');
      }

      if (e.data.type === 'PAUSE') {
        gsap.globalTimeline.pause();
      }

      if (e.data.type === 'PLAY') {
        gsap.globalTimeline.play();
      }

      if (e.data.type === 'SET_TIMESCALE') {
        _timeScale = e.data.value;
        gsap.globalTimeline.timeScale(_timeScale);
      }

      if (e.data.type === 'SET_THEME') {
        document.body.setAttribute('data-theme', e.data.theme);
      }
    });
  </script>
</body>
</html>
